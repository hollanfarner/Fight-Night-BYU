<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BYU LAW FIGHT NIGHT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #050f1d;
      --card: rgba(10, 30, 50, 0.72);
      --card-border: rgba(241, 194, 72, 0.28);
      --text: #f7f3eb;
      --muted: #b6c2cf;
      --gold: #f1c248;
      --ink: #0d2440;
      --ok: #69d591;
      --danger: #ef7a74;
      --blue: #ff7268;
      --red: #5da4ff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "DM Sans", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 0%, rgba(15, 54, 89, 0.95), transparent 48%),
        radial-gradient(circle at 95% 100%, rgba(241, 194, 72, 0.2), transparent 35%),
        var(--bg);
      padding: 24px;
    }

    .wrap {
      max-width: 1320px;
      margin: 0 auto;
    }

    .arena {
      display: grid;
      grid-template-columns: 280px minmax(0, 760px) 280px;
      gap: 18px;
      align-items: start;
      justify-content: center;
    }

    .hero {
      text-align: center;
      margin-bottom: 22px;
    }

    .kicker {
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      font-size: 0.72rem;
      margin-bottom: 8px;
    }

    h1 {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(2.4rem, 7vw, 4.8rem);
      letter-spacing: 0.05em;
      line-height: 0.95;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .top-links {
      margin-top: 8px;
      text-align: center;
    }

    .top-links a {
      color: var(--gold);
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
    }

    .top-links a:hover {
      text-decoration: underline;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      backdrop-filter: blur(14px);
      padding: 24px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.35);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .stat {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 10px;
      padding: 10px;
      text-align: center;
    }

    .stat-label {
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 3px;
    }

    .stat-value {
      font-family: "Bebas Neue", sans-serif;
      font-size: 1.75rem;
      color: var(--gold);
      line-height: 1;
    }

    form {
      display: grid;
      gap: 14px;
    }

    label {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
    }

    input,
    select {
      width: 100%;
      border: 1px solid rgba(241, 194, 72, 0.25);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 1rem;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: #000;
    }

    select option,
    select option:checked {
      background: #000;
      color: #fff;
    }

    button {
      margin-top: 6px;
      border: none;
      border-radius: 10px;
      padding: 12px 14px;
      background: linear-gradient(135deg, #f1c248, #ffd56a);
      color: var(--ink);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .status {
      margin-top: 14px;
      min-height: 22px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .status.ok {
      color: var(--ok);
    }

    .status.error {
      color: var(--danger);
    }

    .note {
      margin-top: 16px;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.45;
    }

    .item-fixed {
      border: 1px solid rgba(241, 194, 72, 0.25);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 1rem;
    }

    .fight-pulse {
      margin: 8px 0 20px;
      padding: 12px;
      border: 1px solid rgba(241, 194, 72, 0.24);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.02);
    }

    .fight-top {
      display: flex;
      justify-content: flex-end;
      align-items: baseline;
      margin-bottom: 10px;
      gap: 12px;
    }

    .leader {
      font-family: "Bebas Neue", sans-serif;
      letter-spacing: 0.08em;
      color: var(--gold);
      font-size: 1.2rem;
    }

    .meter-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }

    .meter-name {
      font-size: 0.86rem;
      color: var(--text);
      margin-bottom: 4px;
    }

    .meter-track {
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      overflow: hidden;
    }

    .meter-fill {
      height: 100%;
      width: 0;
      transition: width 350ms ease;
    }

    .meter-fill.scott {
      background: linear-gradient(90deg, #2f7cdb, var(--blue));
    }

    .meter-fill.dante {
      background: linear-gradient(90deg, #d84b41, var(--red));
    }

    .meter-count {
      font-family: "Bebas Neue", sans-serif;
      color: var(--gold);
      font-size: 1.2rem;
      letter-spacing: 0.04em;
      min-width: 40px;
      text-align: right;
    }

    .fighter-lane {
      display: block;
    }

    .fighter-lane.left {
      transform: translateX(8px) rotate(-2deg);
      transform-origin: center;
    }

    .fighter-lane.right {
      transform: translateX(-8px) rotate(2deg);
      transform-origin: center;
    }

    .fighter-shot {
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(241, 194, 72, 0.28);
      background: rgba(255, 255, 255, 0.04);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.3);
    }

    .fighter-shot img {
      width: 100%;
      height: 360px;
      object-fit: cover;
      display: block;
      filter: saturate(1.1) contrast(1.05);
    }

    .fighter-shot figcaption {
      padding: 8px 10px;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
      background: rgba(255, 255, 255, 0.03);
      text-align: center;
    }

    .fallback-photo {
      height: 360px;
      display: none;
      align-items: center;
      justify-content: center;
      font-family: "Bebas Neue", sans-serif;
      font-size: 2.2rem;
      letter-spacing: 0.1em;
      color: rgba(247, 243, 235, 0.9);
      background:
        radial-gradient(circle at 50% 20%, rgba(255, 255, 255, 0.18), transparent 55%),
        linear-gradient(135deg, rgba(93, 164, 255, 0.45), rgba(255, 114, 104, 0.35));
    }

    .fighter-shot.missing img {
      display: none;
    }

    .fighter-shot.missing .fallback-photo {
      display: flex;
    }

    .support-form {
      margin-top: 10px;
      border: 1px solid rgba(241, 194, 72, 0.22);
      border-radius: 12px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.03);
      transform: rotate(0deg);
    }

    .support-label {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
      display: block;
    }

    .support-form input {
      margin-bottom: 8px;
      padding: 9px 10px;
      font-size: 0.9rem;
    }

    .support-form button {
      width: 100%;
      margin-top: 0;
      padding: 10px;
      font-size: 0.72rem;
    }

    .mini-status {
      min-height: 16px;
      margin-top: 6px;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .mini-status.ok {
      color: var(--ok);
    }

    .mini-status.error {
      color: var(--danger);
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .card {
        padding: 18px;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .arena {
        grid-template-columns: 1fr;
      }

      .fighter-lane {
        max-width: 360px;
        width: 100%;
        margin: 0 auto;
        transform: none;
      }

      .fighter-shot img,
      .fallback-photo {
        height: 320px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <p class="kicker">Public Interest Law Fund</p>
      <h1>BYU LAW FIGHT NIGHT</h1>
      <p class="subtitle">Only second-row tickets are available</p>
      <p class="top-links"><a href="admin.html">Admin Dashboard</a></p>
    </header>

    <div class="arena">
      <aside class="fighter-lane left" aria-label="Scott portrait">
        <figure class="fighter-shot" id="scottShot">
          <img src="images/scott.jpg" alt="Scott Swain" loading="lazy" />
          <div class="fallback-photo">SCOTT</div>
          <figcaption>Scott Swain</figcaption>
        </figure>
        <form class="support-form" id="scottSupportForm">
          <label class="support-label" for="scottSupportName">Back Scott</label>
          <input id="scottSupportName" name="name" type="text" maxlength="80" placeholder="Your name" required />
          <input id="scottSupportAmount" name="amount" type="number" min="1" step="0.01" placeholder="Amount (e.g. 25)" required />
          <button type="submit">Back the Guardian Ad Fight 'Em</button>
          <p class="mini-status" id="scottSupportStatus"></p>
        </form>
      </aside>

      <section class="card">

      <div class="stats">
        <div class="stat">
          <div class="stat-label">Price</div>
          <div class="stat-value" id="priceValue">$15</div>
        </div>
        <div class="stat">
          <div class="stat-label">Total Tickets</div>
          <div class="stat-value" id="totalValue">20</div>
        </div>
        <div class="stat">
          <div class="stat-label">Remaining</div>
          <div class="stat-value" id="remainingValue">20</div>
        </div>
      </div>

      <div class="fight-pulse">
        <div class="fight-top">
          <p class="leader" id="leaderText">Leader: Tie</p>
        </div>

        <div class="meter-row">
          <div>
            <p class="meter-name">Scott Swain</p>
            <div class="meter-track">
              <div class="meter-fill scott" id="scottBar"></div>
            </div>
          </div>
          <p class="meter-count" id="scottCount">0</p>
        </div>

        <div class="meter-row">
          <div>
            <p class="meter-name">Dante Richardson</p>
            <div class="meter-track">
              <div class="meter-fill dante" id="danteBar"></div>
            </div>
          </div>
          <p class="meter-count" id="danteCount">0</p>
        </div>
      </div>

      <form id="ticketForm">
        <div>
          <label for="buyerName">Name</label>
          <input id="buyerName" name="name" type="text" maxlength="80" required />
        </div>

        <div>
          <label for="fighterSelect">Back Your Fighter</label>
          <select id="fighterSelect" name="fighter" required>
            <option value="Scott Swain">Scott Swain</option>
            <option value="Dante Richardson">Dante Richardson</option>
          </select>
        </div>

        <div>
          <label>Item</label>
          <p class="item-fixed">Second Row Ticket</p>
          <input type="hidden" name="item" value="Second Row Ticket" />
        </div>

        <div>
          <label for="qtyInput">Quantity</label>
          <input id="qtyInput" name="quantity" type="number" min="1" max="20" value="1" required />
        </div>

        <button id="submitBtn" type="submit">Submit Ticket Request</button>
      </form>

      <p class="status" id="statusText"></p>
      </section>

      <aside class="fighter-lane right" aria-label="Dante portrait">
        <figure class="fighter-shot" id="danteShot">
          <img src="images/dante.jpg" alt="Dante Richardson" loading="lazy" />
          <div class="fallback-photo">DANTE</div>
          <figcaption>Dante Richardson</figcaption>
        </figure>
        <form class="support-form" id="danteSupportForm">
          <label class="support-label" for="danteSupportName">Back Dante</label>
          <input id="danteSupportName" name="name" type="text" maxlength="80" placeholder="Your name" required />
          <input id="danteSupportAmount" name="amount" type="number" min="1" step="0.01" placeholder="Amount (e.g. 25)" required />
          <button type="submit">Back the Debtor-in-PUNCH-session</button>
          <p class="mini-status" id="danteSupportStatus"></p>
        </form>
      </aside>
    </div>
  </div>

  <script>
    const DEFAULT_RENDER_API_BASE = "https://fight-night-byu-1.onrender.com";
    const configuredApiBase = String(window.localStorage.getItem("pilfApiBase") || "").trim();
    const isGithubPages = /\.github\.io$/i.test(window.location.hostname);
    const API_BASE = configuredApiBase
      || (isGithubPages ? DEFAULT_RENDER_API_BASE : "")
      || (window.location.protocol === "file:" ? "http://localhost:3000" : "");
    const form = document.getElementById("ticketForm");
    const statusText = document.getElementById("statusText");
    const submitBtn = document.getElementById("submitBtn");
    const qtyInput = document.getElementById("qtyInput");

    const remainingValue = document.getElementById("remainingValue");
    const totalValue = document.getElementById("totalValue");
    const priceValue = document.getElementById("priceValue");
    const leaderText = document.getElementById("leaderText");
    const scottBar = document.getElementById("scottBar");
    const danteBar = document.getElementById("danteBar");
    const scottCount = document.getElementById("scottCount");
    const danteCount = document.getElementById("danteCount");
    const scottShot = document.getElementById("scottShot");
    const danteShot = document.getElementById("danteShot");
    const scottSupportForm = document.getElementById("scottSupportForm");
    const danteSupportForm = document.getElementById("danteSupportForm");
    const scottSupportStatus = document.getElementById("scottSupportStatus");
    const danteSupportStatus = document.getElementById("danteSupportStatus");

    async function readJsonSafely(response) {
      const raw = await response.text();
      if (!raw) {
        return {};
      }

      try {
        return JSON.parse(raw);
      } catch (_error) {
        return {};
      }
    }

    function bindPhotoFallback(cardElement) {
      const image = cardElement.querySelector("img");
      image.addEventListener("error", () => {
        cardElement.classList.add("missing");
      });
    }

    function renderFightTotals(fighterTotals, leader) {
      const scott = Number(fighterTotals?.scott || 0);
      const dante = Number(fighterTotals?.dante || 0);
      const max = Math.max(1, scott, dante);

      const scottPct = (scott / max) * 100;
      const dantePct = (dante / max) * 100;

      scottBar.style.width = `${scottPct}%`;
      danteBar.style.width = `${dantePct}%`;
      scottCount.textContent = `$${scott.toFixed(2)}`;
      danteCount.textContent = `$${dante.toFixed(2)}`;

      if (leader === "Tie") {
        leaderText.textContent = "Leader: Tie";
      } else {
        leaderText.textContent = `Leader: ${leader}`;
      }
    }

    function setMiniStatus(target, message, type) {
      target.textContent = message;
      target.className = `mini-status ${type || ""}`.trim();
    }

    async function submitSupport(formElement, fighterName, statusElement) {
      const formData = new FormData(formElement);
      const amount = Number(formData.get("amount"));

      if (!Number.isFinite(amount) || amount <= 0) {
        setMiniStatus(statusElement, "Enter a valid amount.", "error");
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/api/contributions`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: String(formData.get("name") || "").trim(),
            fighter: fighterName,
            amount
          })
        });

        const data = await readJsonSafely(response);
        if (!response.ok) {
          throw new Error(data.error || "Could not save contribution.");
        }

        formElement.reset();
        setMiniStatus(statusElement, "Contribution saved.", "ok");
        await loadStatus();
      } catch (error) {
        setMiniStatus(statusElement, error.message, "error");
      }
    }

    async function loadStatus() {
      try {
        const response = await fetch(`${API_BASE}/api/status`);
        const data = await readJsonSafely(response);
        if (!response.ok) {
          throw new Error(data.error || "Could not load ticket status.");
        }

        remainingValue.textContent = String(data.remaining);
        totalValue.textContent = String(data.totalTickets);
        priceValue.textContent = `$${data.price}`;
        renderFightTotals(data.fighterTotals, data.leader);
        qtyInput.max = String(Math.max(1, data.remaining));

        if (data.remaining === 0) {
          submitBtn.disabled = true;
          qtyInput.disabled = true;
          setStatus("Sold out. No tickets remain.", "error");
        } else {
          submitBtn.disabled = false;
          qtyInput.disabled = false;
          clearStatus();
        }
      } catch (error) {
        setStatus(error.message || "Could not load ticket status.", "error");
      }
    }

    function setStatus(message, type) {
      statusText.textContent = message;
      statusText.className = `status ${type || ""}`.trim();
    }

    function clearStatus() {
      statusText.textContent = "";
      statusText.className = "status";
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      clearStatus();

      const formData = new FormData(form);
      const quantity = Number(formData.get("quantity"));

      if (!Number.isInteger(quantity) || quantity < 1) {
        setStatus("Quantity must be a whole number of at least 1.", "error");
        return;
      }

      submitBtn.disabled = true;

      try {
        const response = await fetch(`${API_BASE}/api/orders`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: String(formData.get("name") || "").trim(),
            fighter: String(formData.get("fighter") || ""),
            item: String(formData.get("item") || ""),
            quantity
          })
        });

        const data = await readJsonSafely(response);
        if (!response.ok) {
          throw new Error(data.error || "Submission failed.");
        }

        form.reset();
        qtyInput.value = "1";
        setStatus(`Saved! ${data.remaining} tickets remain.`, "ok");
        await loadStatus();
      } catch (error) {
        setStatus(error.message, "error");
        submitBtn.disabled = false;
      }
    });

    scottSupportForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      await submitSupport(scottSupportForm, "Scott Swain", scottSupportStatus);
    });

    danteSupportForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      await submitSupport(danteSupportForm, "Dante Richardson", danteSupportStatus);
    });

    bindPhotoFallback(scottShot);
    bindPhotoFallback(danteShot);
    loadStatus();
    setInterval(loadStatus, 10000);
  </script>
</body>
</html>
